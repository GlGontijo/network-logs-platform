# Vector-ingest

sources:
  syslog_firewall:
    type: "socket"
    address: "0.0.0.0:1517"
    mode: "udp"
  syslog_firewall_tcp:
    type: "socket"
    address: "0.0.0.0:1517"
    mode: "tcp"

  syslog_app:
    type: "socket"
    address: "0.0.0.0:1516"
    mode: "udp"
  syslog_app_tcp:
    type: "socket"
    address: "0.0.0.0:1516"
    mode: "tcp"

  syslog_general:
    type: "socket"
    address: "0.0.0.0:514"
    mode: "udp"
  syslog_general_tcp:
    type: "socket"
    address: "0.0.0.0:514"
    mode: "tcp"

  syslog_1514:
    type: "socket"
    address: "0.0.0.0:1514"
    mode: "udp"
  syslog_1514_tcp:
    type: "socket"
    address: "0.0.0.0:1514"
    mode: "tcp"


transforms:

  tr_firewall:
    type: "remap"
    inputs: ["syslog_firewall", "syslog_firewall_tcp"]
    source: |
      .collector_port = 1517
      .device_ip = split(string(.host) ?? "0.0.0.0", ":")[0]

  route_general:
    type: "route"
    inputs:
      - "syslog_general"
      - "syslog_general_tcp"
      - "syslog_1514"
      - "syslog_1514_tcp"
    route:
      wifi: |
        starts_with(string!(.host), "10.10.1.") ||
        starts_with(string!(.host), "10.10.2.")

  tr_wifi:
    type: "remap"
    inputs: ["route_general.wifi"]
    source: |
      .collector_port = 514
      .device_ip = split(string(.host) ?? "0.0.0.0", ":")[0]

  tr_app:
    type: "remap"
    inputs: ["syslog_app", "syslog_app_tcp"]
    source: |
      .collector_port = 1516
      .device_ip = split(string(.host) ?? "0.0.0.0", ":")[0]

  tr_general:
    type: "remap"
    inputs: ["route_general._unmatched"]
    source: |
      .collector_port = 514
      .device_ip = split(string(.host) ?? "0.0.0.0", ":")[0]


sinks:

  kafka_firewall:
    type: "kafka"
    inputs: ["tr_firewall"]
    bootstrap_servers: "10.10.15.242:9094"
    topic: "ingest-syslog-firewall"
    encoding: { codec: "json" }
    batch:
      max_bytes: 1048576
      timeout_secs: 1

  kafka_wifi:
    type: "kafka"
    inputs: ["tr_wifi"]
    bootstrap_servers: "10.10.15.242:9094"
    topic: "ingest-syslog-wifi"
    encoding: { codec: "json" }
    batch:
      max_bytes: 1048576
      timeout_secs: 1

  kafka_app:
    type: "kafka"
    inputs: ["tr_app"]
    bootstrap_servers: "10.10.15.242:9094"
    topic: "ingest-syslog-application"
    key_field: "device_ip"
    encoding: { codec: "json" }
    batch:
      max_bytes: 1048576
      timeout_secs: 1

  kafka_general:
    type: "kafka"
    inputs: ["tr_general"]
    bootstrap_servers: "10.10.15.242:9094"
    topic: "ingest-syslog-general"
    key_field: "device_ip"
    encoding: { codec: "json" }
    batch:
      max_bytes: 1048576
      timeout_secs: 1
