name: Atualizar CHANGELOG

on:
  pull_request:
    types: [closed]

permissions:
  contents: write

jobs:
  generate-changelog:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - name: Generate CHANGELOG.md
        run: git-cliff --config cliff.toml -vv --output CHANGELOG.md

      - name: Check if CHANGELOG changed
        id: check_changes
        run: |
          if git diff --quiet CHANGELOG.md; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Ensure branch up-to-date (before commit)
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          # Try to rebase onto origin/main; if that fails, merge (keeps CI non-blocking)
          git rebase origin/main || git merge --no-edit origin/main || true

      - name: Commit and push CHANGELOG (if changed)
        if: steps.check_changes.outputs.changed == 'true'
        uses: EndBug/add-and-commit@v9
        with:
          message: 'chore: atualizar CHANGELOG [skip ci]'
          add: 'CHANGELOG.md'
          author_name: 'github-actions'
          author_email: 'github-actions@github.com'
