name: Atualizar CHANGELOG

on:
  pull_request:
    types: [closed]

permissions:
  contents: write

jobs:
  generate-changelog:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node (explicit to avoid runner warnings)
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Node & npm versions (debug)
        run: |
          node -v
          npm -v

      - name: Install dependencies or auto-changelog globally
        run: |
          if [ -f package.json ]; then
            npm ci
          else
            npm install -g auto-changelog
          fi

      - name: Generate CHANGELOG.md
        run: |
          # Try npm script first; if missing/fails, fall back to global auto-changelog
          set -e
          npm run changelog --silent || auto-changelog -p

      - name: Show changed files (debug)
        run: |
          git status --porcelain
          git --no-pager diff --name-only

      - name: Stage CHANGELOG (if present)
        run: |
          if [ -f CHANGELOG.md ]; then
            git add CHANGELOG.md
          fi

      - name: Check if CHANGELOG changed
        id: check_changes
        run: |
          if git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push CHANGELOG (if changed)
        if: steps.check_changes.outputs.changed == 'true'
        uses: EndBug/add-and-commit@v9
        with:
          message: 'chore: atualizar CHANGELOG [skip ci]'
          add: 'CHANGELOG.md'
          author_name: 'github-actions'
          author_email: 'github-actions@github.com'
